<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo mark -->
  <g transform="translate(520, 160)">
    <rect x="0" y="16" width="72" height="88" rx="18" fill="none" stroke="#8E8E93" stroke-width="4"/>
    <rect x="40" y="0" width="72" height="88" rx="18" fill="none" stroke="#E8702A" stroke-width="4"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="320" text-anchor="middle" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#FAF8F5">Etho</tspan><tspan fill="#E8702A">z</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8E8E93" font-weight="400">
    Protección escolar inteligente
  </text>
  <!-- Badge -->
  <rect x="430" y="420" width="340" height="40" rx="20" fill="#E8702A" fill-opacity="0.15" stroke="#E8702A" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="446" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#E8702A" font-weight="500">
    Cumple con Ley 21.719 desde el día uno
  </text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#636366" letter-spacing="2">
    ethoz.cl
  </text>
</svg>
