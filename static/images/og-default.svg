<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16304F"/>
      <stop offset="100%" stop-color="#0B1E3A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo mark -->
  <g transform="translate(520, 160)">
    <rect x="0" y="16" width="72" height="88" rx="18" fill="none" stroke="#A0A8B2" stroke-width="4"/>
    <rect x="40" y="0" width="72" height="88" rx="18" fill="none" stroke="#3E8FE6" stroke-width="4"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="320" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">
    <tspan fill="#FFFFFF">Etho</tspan><tspan fill="#3E8FE6">z</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" fill="#A0A8B2" font-weight="400">
    Protección escolar inteligente
  </text>
  <!-- Badge -->
  <rect x="430" y="420" width="340" height="40" rx="20" fill="#3E8FE6" fill-opacity="0.15" stroke="#3E8FE6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="446" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" fill="#3E8FE6" font-weight="500">
    Cumple con Ley 21.719 desde el día uno
  </text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" fill="#8E99A6" letter-spacing="2">
    ethoz.cl
  </text>
</svg>
