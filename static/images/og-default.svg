<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#051C2C"/>
  <!-- Subtle line pattern accent bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="#034B8A"/>
  <!-- Logo mark, square corners -->
  <g transform="translate(520, 160)">
    <rect x="0" y="16" width="72" height="88" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <rect x="40" y="0" width="72" height="88" fill="none" stroke="#7AB8E5" stroke-width="4"/>
  </g>
  <!-- Eyebrow -->
  <text x="600" y="260" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#7AB8E5" letter-spacing="1.82">
    ETHOZ · PROTECCIÓN ESCOLAR
  </text>
  <!-- Brand name in serif -->
  <text x="600" y="340" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="80" font-weight="500" letter-spacing="-1.5">
    <tspan fill="#FFFFFF">Etho</tspan><tspan fill="#7AB8E5">z</tspan>
  </text>
  <!-- Short rule -->
  <rect x="576" y="378" width="48" height="1" fill="#FFFFFF"/>
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="28" font-style="italic" font-weight="400" fill="#C6D3DD">
    Protección escolar inteligente
  </text>
  <!-- Compliance note -->
  <text x="600" y="500" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" fill="#93A6B5" font-weight="400">
    Cumple con Ley 21.719 desde el día uno
  </text>
  <!-- URL -->
  <text x="600" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#93A6B5" font-weight="600" letter-spacing="1.82">
    ETHOZ.CL
  </text>
</svg>
