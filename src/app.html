<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<!-- Theme init — FOUC-free. Reads localStorage('theme') or system pref,
		     sets data-theme attribute on <html> BEFORE Svelte hydrates.
		     Mirrored by src/lib/stores/theme.svelte.ts at runtime. -->
		<script>
		  (function () {
		    try {
		      var stored = localStorage.getItem('theme');
		      var theme = stored === 'dark' || stored === 'light'
		        ? stored
		        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
		      document.documentElement.dataset.theme = theme;
		    } catch (e) {
		      document.documentElement.dataset.theme = 'light';
		    }
		  })();
		</script>
		<!-- dataLayer stub (GTM loader runs after consent from +layout.svelte) -->
		<script>
		  window.dataLayer = window.dataLayer || [];
		</script>
		<!-- Preconnect to third-party origins hit during page lifecycle -->
		<link rel="preconnect" href="https://irpesrcijcdwyjxxwpyb.supabase.co" crossorigin />
		<link rel="preconnect" href="https://www.clarity.ms" crossorigin />
		<link rel="dns-prefetch" href="https://www.googletagmanager.com" />
		<!-- Cal Sans display font — preload for first-paint headlines -->
		<link rel="preload" href="/fonts/cal-sans/CalSans-Regular.ttf" as="font" type="font/ttf" crossorigin />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg?v=3" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png?v=3" />
		<link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/apple-touch-icon.png?v=3" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Theme-color matches Cal canvas tokens (DESIGN.md: canvas=#ffffff light, #0f0f0f dark) -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="Protección escolar inteligente. Cumplimiento Ley 21.719, seguridad escolar y convivencia para colegios en Chile." />
		<meta property="og:image" content="https://ethoz.cl/images/og-default.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<link rel="llms" href="/llms.txt" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
